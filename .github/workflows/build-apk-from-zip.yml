name: Build APK From Uploaded ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama file ZIP source yang di-upload ke root repository'
        required: true
        default: 'text_editor_premium_source.zip'

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    env:
      DEFAULT_ZIP_NAME: text_editor_premium_source.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve ZIP name
        id: zip
        shell: bash
        run: |
          ZIP_NAME="${{ github.event.inputs.zip_name }}"
          if [ -z "$ZIP_NAME" ]; then
            ZIP_NAME="$DEFAULT_ZIP_NAME"
          fi
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Menggunakan ZIP: $ZIP_NAME"

      - name: Validate uploaded ZIP
        shell: bash
        run: |
          ZIP_NAME="${{ steps.zip.outputs.zip_name }}"
          if [ ! -f "$ZIP_NAME" ]; then
            echo "File ZIP tidak ditemukan: $ZIP_NAME"
            echo "Pastikan file ZIP di-upload ke root repository, sejajar dengan README.md."
            exit 1
          fi
          unzip -t "$ZIP_NAME"

      - name: Extract source ZIP
        shell: bash
        run: |
          rm -rf source_unzipped
          mkdir source_unzipped
          unzip -q "${{ steps.zip.outputs.zip_name }}" -d source_unzipped
          echo "Hasil extract:"
          find source_unzipped -maxdepth 3 -type f | sort

      - name: Locate Flutter project
        id: project
        shell: bash
        run: |
          PUBSPEC_PATH=$(find source_unzipped -name pubspec.yaml -not -path '*/.dart_tool/*' -print -quit)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "pubspec.yaml tidak ditemukan di dalam ZIP."
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Flutter project ditemukan di: $PROJECT_DIR"

      - name: Generate Android folder if missing
        shell: bash
        run: |
          PROJECT_DIR="${{ steps.project.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          if [ ! -d android ]; then
            flutter create --project-name text_editor_premium --org com.stevanus --platforms=android .
          fi

      - name: Flutter pub get
        shell: bash
        run: |
          cd "${{ steps.project.outputs.project_dir }}"
          flutter pub get

      - name: Flutter analyze
        shell: bash
        run: |
          cd "${{ steps.project.outputs.project_dir }}"
          flutter analyze

      - name: Build debug APK
        shell: bash
        run: |
          cd "${{ steps.project.outputs.project_dir }}"
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: text-editor-premium-debug-apk
          path: ${{ steps.project.outputs.project_dir }}/build/app/outputs/flutter-apk/app-debug.apk
